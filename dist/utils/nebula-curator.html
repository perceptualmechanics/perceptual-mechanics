<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nebula · star curator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000812;
      color: #fff;
      font-family: 'Electrolize', monospace;
      min-height: 100vh;
    }
    body { padding: 2rem 1.5rem; max-width: 700px; margin: 0 auto; }

    h1 {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }

    input[type="url"] {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,210,255,0.2);
      border-radius: 4px;
      padding: 0.6rem 0.9rem;
      color: #fff;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    input[type="url"]:focus { border-color: rgba(180,210,255,0.4); }

    button {
      background: rgba(180,210,255,0.08);
      border: 1px solid rgba(180,210,255,0.2);
      border-radius: 4px;
      color: rgba(255,255,255,0.75);
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover { background: rgba(180,210,255,0.15); }
    button:disabled { opacity: 0.4; cursor: wait; }

    .btn-gold {
      background: rgba(255,220,120,0.08);
      border-color: rgba(255,220,120,0.2);
      color: rgba(255,220,120,0.8);
    }
    .btn-gold:hover { background: rgba(255,220,120,0.15); }

    .btn-muted {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }

    #status {
      font-size: 0.72rem;
      color: rgba(180,210,255,0.6);
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      white-space: pre-line;
      line-height: 1.6;
      min-height: 1.2rem;
    }

    .actions { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }

    .star-count {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .constellation-group { margin-bottom: 1.5rem; }

    .constellation-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(180,210,255,0.35);
      margin-bottom: 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid rgba(180,210,255,0.08);
    }

    .star-list { display: flex; flex-direction: column; gap: 0.4rem; }

    .star-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,210,255,0.12);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .star-info { flex: 1; min-width: 0; }

    .star-title {
      font-weight: 500;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .star-badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(180,210,255,0.6);
      background: rgba(180,210,255,0.08);
      border-radius: 3px;
      padding: 0.15rem 0.4rem;
      margin-bottom: 0.25rem;
    }

    .star-desc {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      margin-top: 0.2rem;
      line-height: 1.5;
    }

    .star-url {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      margin-top: 0.35rem;
      word-break: break-all;
    }

    .star-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.2);
      font-size: 1rem;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .star-remove:hover { background: none; color: rgba(255,100,100,0.6); }

    .empty {
      text-align: center;
      color: rgba(255,255,255,0.15);
      font-size: 0.8rem;
      margin-top: 4rem;
      letter-spacing: 0.1em;
      line-height: 2;
    }
  </style>
  <script type="module" crossorigin src="/assets/nebula-CS2rNHFj.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>

  <h1>nebula · star curator</h1>

  <div class="input-row">
    <input type="url" id="url-input" placeholder="paste a URL…" />
    <button id="add-btn">add star</button>
  </div>

  <div id="status"></div>

  <div class="actions" id="actions" style="display:none">
    <button class="btn-gold" id="remap-btn">✦ rebuild constellations</button>
    <button class="btn-muted" id="copy-btn">copy as JS</button>
  </div>

  <div class="star-count" id="star-count"></div>
  <div id="star-list"></div>
  <div class="empty" id="empty">the nebula is empty<br>paste a URL to add the first star</div>


</body>
</html>
