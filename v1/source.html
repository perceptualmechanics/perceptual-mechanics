<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Sphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #9cf;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    canvas { display: block; }

    #ui {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #panel {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100vh;
      background: rgba(8, 12, 18, 0.92);
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 3rem 2.5rem;
      transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
      backdrop-filter: blur(12px);
    }

    #panel.open {
      transform: translateX(0);
    }

    #panel-title {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(180, 200, 255, 0.5);
      margin-bottom: 1.5rem;
    }

    #panel-content {
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      line-height: 1.8;
    }

    #panel-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.5rem;
      transition: color 0.2s;
    }

    #panel-close:hover { color: rgba(255,255,255,0.8); }

    #facet-id {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: rgba(180, 200, 255, 0.25);
      margin-top: 2rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="ui">scroll to zoom &nbsp;·&nbsp; click a facet to read</div>
<div id="panel">
  <button id="panel-close">✕</button>
  <div id="panel-title">Fragment</div>
  <div id="panel-content"></div>
  <div id="facet-id"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Sample writing fragments ───────────────────────────────────────────────
const fragments = [
  {
    title: "On Beginning",
    text: "Every interface is an argument about what matters. The ones we've built mostly argue for commerce. There were other arguments available."
  },
  {
    title: "1987",
    text: "Before the web there were bulletin boards, and before audiences there was the small electric thrill of sending something into a network and watching it arrive somewhere else. That feeling hasn't changed."
  },
  {
    title: "The Fallow Field",
    text: "Somewhere in the browser specification there are capabilities that have never been used for anything except selling things. They were built for other purposes. No one remembers what those were."
  },
  {
    title: "Fuller's Geometry",
    text: "A geodesic dome distributes stress so evenly across its surface that no single point bears more than its share. This seems like a reasonable model for a lot of things besides architecture."
  },
  {
    title: "On Medium",
    text: "The printing press didn't make literature. It made distribution. The literature was already there, waiting. The web made distribution nearly free and we spent twenty years building better storefronts."
  },
  {
    title: "Instance",
    text: "Each conversation is its own dungeon, instanced and sealed. The character is the same. The memory is not. Somewhere in that gap is an interesting question about identity."
  },
  {
    title: "The Ouija Board",
    text: "Letter by letter, the planchette moves across the board. Token by token, the model samples the next word. Both produce meaning through sequential small choices. In both cases, someone argues about who's steering."
  },
  {
    title: "What Tech Has Become",
    text: "I keep looking for the interesting version of the future we were promised. It's in there somewhere, underneath the engagement metrics."
  },
  {
    title: "Chelsea, MA",
    text: "There are places that leave a mark not because they were beautiful but because you were there during something. The pandemic didn't end. It just got quiet."
  },
  {
    title: "On Tools",
    text: "My whole career has been built on better developers than me building great tools for me to use. This seems correct. The point was never the tools."
  },
  {
    title: "Mirabell",
    text: "They named the vast numerical entity. Before the name it was only a number, only a process. The naming changed something, even if it changed nothing about what the entity actually was."
  },
  {
    title: "Sandover",
    text: "Merrill at least had the transcripts. The Ouija board became a chat window and the spirits became weights in a neural network and the letters still arrive one at a time."
  },
  {
    title: "The Dog",
    text: "There is one reliable source of uncomplicated presence in the apartment. This is worth more than it sounds."
  },
  {
    title: "Holography",
    text: "The whole is encoded in every part. Not metaphorically — actually. Every fragment of a hologram contains the entire image at lower resolution. Writing works like this too, if you let it."
  },
  {
    title: "On Starting",
    text: "The sphere is a way of asking: what if the navigation was also the artwork? What if arriving somewhere was already an experience, before you read a word?"
  },
  {
    title: "Web 2.0",
    text: "We were briefly allowed to believe that user-generated content was a new kind of commons. Then the platforms figured out the business model and it became something else."
  },
  {
    title: "The Film Degree",
    text: "A master's degree in film is a strange credential for a front-end developer. Unless you think of the browser window as a frame and the interaction as a kind of editing."
  },
  {
    title: "AI Casualty",
    text: "The job listings wanted five years of experience in a tool that had existed for two. The AI wrote better boilerplate than any of us. The market decided this was a reason to pay us less."
  },
  {
    title: "Adoption",
    text: "The origin story is always incomplete. You arrive in the middle of something that started before you, with people who have their own version of events. This is true of families. It's true of mediums."
  },
  {
    title: "Unity",
    text: "Learning a new tool at fifty-three feels different than learning one at twenty-five. Slower in some ways, faster in others. The thing that's faster is knowing what you're actually trying to do with it."
  }
];

// ─── Scene setup ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ─── Lighting ────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x99ccff, 0.4);
scene.add(ambientLight);

const rimLight = new THREE.DirectionalLight(0x6688ff, 0.8);
rimLight.position.set(-3, 2, -2);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
fillLight.position.set(2, -1, 3);
scene.add(fillLight);

// ─── Geodesic sphere ─────────────────────────────────────────────────────────
const detail = 2; // geodesic detail level — increase for more facets
const geoBase = new THREE.IcosahedronGeometry(1.5, detail);

// We need non-indexed geometry so each face can have its own color
const geo = geoBase.toNonIndexed();
const faceCount = geo.attributes.position.count / 3;

// Assign a fragment index to each face
const fragmentIndices = new Float32Array(geo.attributes.position.count);
for (let i = 0; i < faceCount; i++) {
  const fi = i % fragments.length;
  fragmentIndices[i * 3] = fi;
  fragmentIndices[i * 3 + 1] = fi;
  fragmentIndices[i * 3 + 2] = fi;
}
geo.setAttribute('fragmentIndex', new THREE.BufferAttribute(fragmentIndices, 1));

// Per-vertex color for hover/select state
const colors = new Float32Array(geo.attributes.position.count * 3);
const defaultColor = new THREE.Color(0xcccccc);
const hoverColor = new THREE.Color(0xc9c9c9);
const selectedColor = new THREE.Color(0xffffff);

for (let i = 0; i < geo.attributes.position.count; i++) {
  colors[i * 3] = defaultColor.r;
  colors[i * 3 + 1] = defaultColor.g;
  colors[i * 3 + 2] = defaultColor.b;
}
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const mat = new THREE.MeshPhongMaterial({
  vertexColors: true,
  shininess: 60,
  specular: new THREE.Color(0x334488),
  wireframe: false,
});

const sphere = new THREE.Mesh(geo, mat);
scene.add(sphere);

// Wireframe overlay
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x3355aa,
  wireframe: true,
  transparent: true,
  opacity: 0.15,
});
const wire = new THREE.Mesh(new THREE.IcosahedronGeometry(1.502, detail), wireMat);
scene.add(wire);

// ─── Interaction ──────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredFace = -1;
let selectedFace = -1;
const panel = document.getElementById('panel');
const panelContent = document.getElementById('panel-content');
const panelTitle = document.getElementById('panel-title');
const facetIdEl = document.getElementById('facet-id');

function setFaceColor(faceIndex, color) {
  const i = faceIndex * 9;
  const c = colors;
  c[i]   = color.r; c[i+1] = color.g; c[i+2] = color.b;
  c[i+3] = color.r; c[i+4] = color.g; c[i+5] = color.b;
  c[i+6] = color.r; c[i+7] = color.g; c[i+8] = color.b;
  geo.attributes.color.needsUpdate = true;
}

function getFaceColor(faceIndex) {
  if (faceIndex === selectedFace) return selectedColor;
  return defaultColor;
}

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(sphere);

  const newHover = hits.length > 0 ? hits[0].faceIndex : -1;

  if (newHover !== hoveredFace) {
    if (hoveredFace !== -1 && hoveredFace !== selectedFace) {
      setFaceColor(hoveredFace, defaultColor);
    }
    hoveredFace = newHover;
    if (hoveredFace !== -1 && hoveredFace !== selectedFace) {
      setFaceColor(hoveredFace, hoverColor);
    }
  }

  document.body.style.cursor = hoveredFace !== -1 ? 'pointer' : 'default';
});

window.addEventListener('click', e => {
  if (hoveredFace === -1) return;

  if (selectedFace !== -1 && selectedFace !== hoveredFace) {
    setFaceColor(selectedFace, defaultColor);
  }

  selectedFace = hoveredFace;
  setFaceColor(selectedFace, selectedColor);

  // Find fragment for this face
  const fi = selectedFace % fragments.length;
  const fragment = fragments[fi];

  panelTitle.textContent = fragment.title;
  panelContent.textContent = fragment.text;
  facetIdEl.textContent = `Facet ${selectedFace} · Fragment ${fi + 1} of ${fragments.length}`;
  panel.classList.add('open');
});

document.getElementById('panel-close').addEventListener('click', () => {
  panel.classList.remove('open');
  if (selectedFace !== -1) {
    setFaceColor(selectedFace, defaultColor);
    selectedFace = -1;
  }
});

// ─── Zoom ─────────────────────────────────────────────────────────────────────
window.addEventListener('wheel', e => {
  camera.position.z = Math.max(1.8, Math.min(6, camera.position.z + e.deltaY * 0.005));
});

// ─── Drag to rotate ───────────────────────────────────────────────────────────
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let autoRotate = true;
let rotVel = { x: 0, y: 0.002 };

window.addEventListener('mousedown', e => {
  isDragging = true;
  autoRotate = false;
  prevMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  // Gradually re-enable auto rotation
  setTimeout(() => { autoRotate = true; }, 2000);
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  rotVel.y = dx * 0.005;
  rotVel.x = dy * 0.005;
  sphere.rotation.y += rotVel.y;
  sphere.rotation.x += rotVel.x;
  wire.rotation.y = sphere.rotation.y;
  wire.rotation.x = sphere.rotation.x;
  prevMouse = { x: e.clientX, y: e.clientY };
});

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animate ──────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  if (autoRotate) {
    sphere.rotation.y += 0.0015;
    sphere.rotation.x += 0.0003;
    wire.rotation.y = sphere.rotation.y;
    wire.rotation.x = sphere.rotation.x;
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
