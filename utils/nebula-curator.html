<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nebula · star curator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000812;
      color: #fff;
      font-family: 'Electrolize', monospace;
      min-height: 100vh;
    }
    body { padding: 2rem 1.5rem; max-width: 700px; margin: 0 auto; }

    h1 {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }

    input[type="url"] {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,210,255,0.2);
      border-radius: 4px;
      padding: 0.6rem 0.9rem;
      color: #fff;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    input[type="url"]:focus { border-color: rgba(180,210,255,0.4); }

    button {
      background: rgba(180,210,255,0.08);
      border: 1px solid rgba(180,210,255,0.2);
      border-radius: 4px;
      color: rgba(255,255,255,0.75);
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover { background: rgba(180,210,255,0.15); }
    button:disabled { opacity: 0.4; cursor: wait; }

    .btn-gold {
      background: rgba(255,220,120,0.08);
      border-color: rgba(255,220,120,0.2);
      color: rgba(255,220,120,0.8);
    }
    .btn-gold:hover { background: rgba(255,220,120,0.15); }

    .btn-muted {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }

    #status {
      font-size: 0.72rem;
      color: rgba(180,210,255,0.6);
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      white-space: pre-line;
      line-height: 1.6;
      min-height: 1.2rem;
    }

    .actions { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }

    .star-count {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .constellation-group { margin-bottom: 1.5rem; }

    .constellation-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(180,210,255,0.35);
      margin-bottom: 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid rgba(180,210,255,0.08);
    }

    .star-list { display: flex; flex-direction: column; gap: 0.4rem; }

    .star-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,210,255,0.12);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .star-info { flex: 1; min-width: 0; }

    .star-title {
      font-weight: 500;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .star-badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(180,210,255,0.6);
      background: rgba(180,210,255,0.08);
      border-radius: 3px;
      padding: 0.15rem 0.4rem;
      margin-bottom: 0.25rem;
    }

    .star-desc {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      margin-top: 0.2rem;
      line-height: 1.5;
    }

    .star-url {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      margin-top: 0.35rem;
      word-break: break-all;
    }

    .star-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.2);
      font-size: 1rem;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .star-remove:hover { background: none; color: rgba(255,100,100,0.6); }

    .empty {
      text-align: center;
      color: rgba(255,255,255,0.15);
      font-size: 0.8rem;
      margin-top: 4rem;
      letter-spacing: 0.1em;
      line-height: 2;
    }
  </style>
</head>
<body>

  <h1>nebula · star curator</h1>

  <div class="input-row">
    <input type="url" id="url-input" placeholder="paste a URL…" />
    <button id="add-btn">add star</button>
  </div>

  <div id="status"></div>

  <div class="actions" id="actions" style="display:none">
    <button class="btn-gold" id="remap-btn">✦ rebuild constellations</button>
    <button class="btn-muted" id="copy-btn">copy as JS</button>
  </div>

  <div class="star-count" id="star-count"></div>
  <div id="star-list"></div>
  <div class="empty" id="empty">the nebula is empty<br>paste a URL to add the first star</div>

  <script type="module">
    const STORAGE_KEY = 'nebula-stars';
    const API_URL = 'https://api.anthropic.com/v1/messages';

    let stars = [];
    try { stars = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch {}

    const urlInput  = document.getElementById('url-input');
    const addBtn    = document.getElementById('add-btn');
    const statusEl  = document.getElementById('status');
    const actionsEl = document.getElementById('actions');
    const countEl   = document.getElementById('star-count');
    const listEl    = document.getElementById('star-list');
    const emptyEl   = document.getElementById('empty');
    const remapBtn  = document.getElementById('remap-btn');
    const copyBtn   = document.getElementById('copy-btn');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stars));
      render();
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    async function callClaude(prompt, maxTokens = 400) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: maxTokens,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      const data = await res.json();
      return data.content?.map(b => b.text || '').join('') || '';
    }

    function parseJSON(text) {
      try { return JSON.parse(text.replace(/```json|```/g, '').trim()); } catch { return null; }
    }

    async function addStar() {
      const url = urlInput.value.trim();
      if (!url) return;
      if (stars.some(s => s.url === url)) { setStatus('Already in the nebula.'); return; }

      addBtn.disabled = true;
      setStatus('Asking Claude about this link…');

      const prompt = `A user wants to add this URL to a personal digital art project called "The Nebula" — a star field where each star is a link to something meaningful to them (mostly YouTube videos, but anything goes). The project is by Scott Jason Cohen, a writer, filmmaker, and game designer.

URL: ${url}

From this URL alone (without visiting it), infer:
1. A short evocative TITLE (max 8 words)
2. A one-sentence DESCRIPTION (max 20 words) of what this likely is
3. A CONSTELLATION name — a thematic category (poetic and specific, e.g. "Prog Rock", "The Infinite Game", "Signal and Noise")
4. A COLOR hint — one word: warm / cool / electric / ancient / strange / bright / deep

Respond ONLY with valid JSON, no markdown:
{"title":"...","description":"...","constellation":"...","color":"..."}`;

      try {
        const text = await callClaude(prompt);
        const meta = parseJSON(text) || { title: url, description: '', constellation: 'Uncategorized', color: 'cool' };
        stars.push({
          id: Date.now().toString(),
          url,
          title: meta.title || url,
          description: meta.description || '',
          constellation: meta.constellation || 'Uncategorized',
          color: meta.color || 'cool',
          added: new Date().toISOString(),
        });
        save();
        urlInput.value = '';
        setStatus(`✦ Added to: ${meta.constellation}`);
        setTimeout(() => setStatus(''), 3000);
      } catch {
        setStatus('Error — star added without metadata.');
        stars.push({ id: Date.now().toString(), url, title: url, description: '', constellation: 'Uncategorized', color: 'cool', added: new Date().toISOString() });
        save();
        urlInput.value = '';
      }
      addBtn.disabled = false;
    }

    async function rebuildConstellations() {
      if (stars.length < 3) { setStatus('Add more stars first.'); return; }
      remapBtn.disabled = true;
      setStatus('Claude is mapping the constellations…');

      const list = stars.map((s, i) => `${i+1}. "${s.title}" (${s.url}) — currently: "${s.constellation}"`).join('\n');

      const prompt = `You are helping curate "The Nebula" — a personal star field digital art piece by Scott Jason Cohen (writer, filmmaker, game designer, Boca Raton FL). It lives on perceptualmechanics.com alongside a geodesic literary sphere and a Lorenz attractor visualization.

Stars:\n${list}

Reassign each star to a constellation reflecting genuine thematic, aesthetic, or intellectual relationships — not surface categories. Names should be poetic and specific (not "Videos" — instead "The Seventies Dream" or "Recursion"). Also suggest 2-3 CONNECTION pairs between stars with deep resonance.

Respond ONLY with valid JSON:
{"assignments":{"1":"constellation","2":"constellation",...},"connections":[{"stars":[1,3],"reason":"one sentence"},...]}`;

      try {
        const text = await callClaude(prompt, 800);
        const result = parseJSON(text);
        if (result?.assignments) {
          stars = stars.map((s, i) => ({
            ...s,
            constellation: result.assignments[String(i+1)] || s.constellation,
          }));
          save();
          const conns = result.connections?.map(c => `${c.stars.join(' ↔ ')}: ${c.reason}`).join('\n') || '';
          setStatus(`Constellations remapped.${ conns ? '\n\nConnections:\n' + conns : ''}`);
        }
      } catch { setStatus('Error remapping.'); }
      remapBtn.disabled = false;
    }

    function exportJS() {
      const js = `// nebula-stars.js — generated by Nebula Curator\nexport const stars = ${JSON.stringify(stars, null, 2)};\n`;
      navigator.clipboard.writeText(js).then(() => {
        copyBtn.textContent = 'copied ✓';
        setTimeout(() => { copyBtn.textContent = 'copy as JS'; }, 2000);
      });
    }

    function removeStar(id) {
      stars = stars.filter(s => s.id !== id);
      save();
    }

    function render() {
      const groups = stars.reduce((acc, s) => {
        if (!acc[s.constellation]) acc[s.constellation] = [];
        acc[s.constellation].push(s);
        return acc;
      }, {});

      emptyEl.style.display = stars.length === 0 ? 'block' : 'none';
      actionsEl.style.display = stars.length >= 3 ? 'flex' : 'none';
      countEl.textContent = stars.length > 0
        ? `${stars.length} star${stars.length !== 1 ? 's' : ''} · ${Object.keys(groups).length} constellation${Object.keys(groups).length !== 1 ? 's' : ''}`
        : '';

      listEl.innerHTML = Object.entries(groups).map(([constellation, group]) => `
        <div class="constellation-group">
          <div class="constellation-label">✦ ${constellation}</div>
          <div class="star-list">
            ${group.map(star => `
              <div class="star-card">
                <div class="star-info">
                  <div class="star-title">${star.title}</div>
                  ${star.constellation ? `<span class="star-badge">${star.constellation}</span>` : ''}
                  ${star.description ? `<div class="star-desc">${star.description}</div>` : ''}
                  <div class="star-url">${star.url}</div>
                </div>
                <button class="star-remove" data-id="${star.id}" aria-label="Remove star">✕</button>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      listEl.querySelectorAll('.star-remove').forEach(btn => {
        btn.addEventListener('click', () => removeStar(btn.dataset.id));
      });
    }

    addBtn.addEventListener('click', addStar);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addStar(); });
    remapBtn.addEventListener('click', rebuildConstellations);
    copyBtn.addEventListener('click', exportJS);

    render();
  </script>

</body>
</html>
