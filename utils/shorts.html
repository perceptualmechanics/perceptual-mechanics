<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>perceptual mechanics · shorts</title>
  <meta name="theme-color" content="#000000"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Electrolize', monospace;
    }

    #shorts-frame {
      position: relative;
      /* 9:16 — sized by JS to fit viewport */
      background: #000;
      overflow: hidden;
      flex-shrink: 0;
    }

    #shorts-frame canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* Scene title overlay — shown when ?title param present */
    #shorts-title {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.85);
      font-size: clamp(0.7rem, 3vw, 1.1rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
      z-index: 10;
      font-family: 'Times New Roman', serif;
      display: none;
    }
    #shorts-title.visible { display: block; }

    /* Watermark — always present, very subtle */
    #shorts-watermark {
      position: absolute;
      bottom: 0.8rem;
      right: 1rem;
      color: rgba(255,255,255,0.15);
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
    }

    /* Loading state */
    #shorts-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      z-index: 5;
    }

    /* Error state */
    #shorts-error {
      color: rgba(255,100,100,0.6);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 2rem;
      display: none;
    }
  </style>
</head>
<body>

  <div id="shorts-frame">
    <div id="shorts-loading">loading…</div>
    <p id="shorts-title" aria-hidden="true"></p>
    <p id="shorts-watermark" aria-hidden="true">perceptual mechanics</p>
  </div>

  <div id="shorts-error">
    unknown scene.<br>
    try <code>?scene=butterfly</code> or <code>?scene=sphere</code>
  </div>

  <script type="module">
    import { createButterfly } from '../src/scenes/butterfly.js';
    import { createSphere }    from '../src/scenes/sphere.js';
    import { createNebula }    from '../src/scenes/nebula.js';
    import { createEgg }       from '../src/scenes/egg.js';

    const SCENES = {
      butterfly: {
        create: createButterfly,
        title: 'Chaos Butterfly in Phase Space, 2026',
        bg: '#000000',
      },
      sphere: {
        create: createSphere,
        title: 'The Sphere',
        bg: '#000811',
      },
      nebula: {
        create: createNebula,
        title: 'Nebula',
        bg: '#000000',
      },
      egg: {
        create: createEgg,
        title: 'The Egg — Worldline',
        bg: '#000000',
      },
    };

    const params  = new URLSearchParams(window.location.search);
    const sceneName  = (params.get('scene') || 'butterfly').toLowerCase();
    const showTitle  = params.has('title');
    const rotSpeed   = parseFloat(params.get('speed') || '1'); // multiplier on default speed
    const aspectW    = parseInt(params.get('w') || '9');
    const aspectH    = parseInt(params.get('h') || '16');

    const frame   = document.getElementById('shorts-frame');
    const loading = document.getElementById('shorts-loading');
    const titleEl = document.getElementById('shorts-title');
    const errorEl = document.getElementById('shorts-error');

    const def = SCENES[sceneName];

    if (!def) {
      frame.style.display = 'none';
      errorEl.style.display = 'block';
    } else {
      // Size the frame to fit viewport at target aspect ratio
      function sizeFrame() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const ratio = aspectW / aspectH;
        let fw, fh;
        if (vw / vh < ratio) {
          fw = vw;
          fh = Math.round(vw / ratio);
        } else {
          fh = vh;
          fw = Math.round(vh * ratio);
        }
        frame.style.width  = fw + 'px';
        frame.style.height = fh + 'px';
      }
      sizeFrame();
      window.addEventListener('resize', sizeFrame);
      window.addEventListener('orientationchange', () => setTimeout(sizeFrame, 150));

      frame.style.background = def.bg;

      // Title overlay
      if (showTitle) {
        titleEl.textContent = def.title;
        titleEl.classList.add('visible');
      }

      // Launch scene — pass shorts + speed hint via URL params
      // Each scene reads window.location.search internally for ?shorts
      // We inject speed as a data attribute the scene can optionally read
      frame.dataset.rotSpeed = rotSpeed;

      loading.remove();
      def.create(frame, { preview: false, shorts: true, rotSpeed });
    }
  </script>

</body>
</html>
