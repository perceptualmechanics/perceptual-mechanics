<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="author" content="Scott Jason Cohen"/>
  <meta name="description" content="Perceptual Mechanics — a digital art project by Scott Jason Cohen. Interactive visualizations of chaos, language, and phase space."/>
  <link rel="canonical" href="https://perceptualmechanics.com/"/>

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://perceptualmechanics.com/"/>
  <meta property="og:title" content="perceptual mechanics"/>
  <meta property="og:description" content="Perceptual Mechanics — a digital art project by Scott Jason Cohen. Interactive visualizations of chaos, language, and phase space."/>
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:title" content="perceptual mechanics"/>
  <meta name="twitter:description" content="Perceptual Mechanics — a digital art project by Scott Jason Cohen. Interactive visualizations of chaos, language, and phase space."/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Zen Maru Gothic dropped 2026-07-22 — was leaf.js's caption font only,
       now replaced by Coda there, so nothing on the site uses it anymore. -->
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&family=Patrick+Hand&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Ogham&family=Coda:wght@400;800&display=swap" rel="stylesheet">
  <title>perceptual mechanics</title>
  <meta name="theme-color" content="#000000"/>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

  <a href="#landing" class="skip-link">Skip to main content</a>

  <!-- Persistent nav bar — all seven scenes -->
  <nav id="pm-nav" aria-label="Perceptual Mechanics navigation">

    <!-- Sphere: geodesic / icosahedron outline -->
    <button type="button" class="nav-icon" data-scene="sphere" aria-label="Sphere" title="The Sphere — Interconnected Text Fragments" onmouseover="pmGlimpse('sphere')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <ellipse cx="12" cy="12" rx="9" ry="4"/>
        <line x1="12" y1="3" x2="12" y2="21"/>
        <path d="M3 9h18M3 15h18"/>
      </svg>
    </button>

    <!-- Butterfly: Lorenz / figure-8 attractor shape -->
    <button type="button" class="nav-icon" data-scene="butterfly" aria-label="Butterfly" title="Chaos Butterfly in Phase Space, 2026" onmouseover="pmGlimpse('butterfly')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 12 C8 6, 2 6, 3 12 C4 18, 10 17, 12 12"/>
        <path d="M12 12 C16 6, 22 6, 21 12 C20 18, 14 17, 12 12"/>
        <circle cx="12" cy="12" r="0.8" fill="currentColor"/>
      </svg>
    </button>

    <!-- Manuscript: Ogham letter Sail, four strokes off a stemline -->
    <button type="button" class="nav-icon" data-scene="manuscript" aria-label="Manuscript" title="Selected Works — An Illuminated Manuscript" onmouseover="pmGlimpse('scroll')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="6" y1="2.5" x2="6" y2="21.5"/>
        <line x1="6" y1="5.5" x2="19" y2="5.5"/>
        <line x1="6" y1="9.8" x2="19" y2="9.8"/>
        <line x1="6" y1="14.1" x2="19" y2="14.1"/>
        <line x1="6" y1="18.4" x2="19" y2="18.4"/>
      </svg>
    </button>

    <!-- Theater: film camera -->
    <button type="button" class="nav-icon" data-scene="theater" aria-label="The Theater" title="The Theater — Now Playing" onmouseover="pmGlimpse('theater')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="7" width="12" height="10" rx="1"/>
        <path d="M15 10.2 L21 7.5 V16.5 L15 13.8"/>
        <circle cx="7.2" cy="5.6" r="1.5"/>
        <circle cx="12" cy="4.6" r="1.1"/>
      </svg>
    </button>

    <!-- Egg, Leaf -->
    <button type="button" class="nav-icon" data-scene="egg" aria-label="The Egg" title="The Egg — Aurorae, Magnetic Field, Satellites" onmouseover="pmGlimpse('egg')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="6"/>
        <path d="M12 3 C18 6 18 18 12 21"/>
        <path d="M12 3 C6 6 6 18 12 21"/>
        <circle cx="20" cy="9" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <button type="button" class="nav-icon" data-scene="leaf" aria-label="Leaf" title="Leaf — In The End It Falls Slowly Through The Aether" onmouseover="pmGlimpse('leaf')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3c5 2 7 6 5 11-1.5 3.7-4 5.5-5 7-1-1.5-3.5-3.3-5-7-2-5 0-9 5-11z"/>
        <path d="M12 4v15"/>
      </svg>
    </button>

    <!-- Orrery: sun and concentric orbit rings, hung from a mast — was
         three shells rotated around a shared center, which reads as an
         atom (electron orbits), not an orrery (planets in one plane).
         Scott, 2026-07-17: "it's an atom now, not a solar system." -->
    <button type="button" class="nav-icon" data-scene="orrery" aria-label="Orrery" title="The Orrery of Los Feliz" onmouseover="pmGlimpse('orrery')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="12" x2="12" y2="2.5"/>
        <ellipse cx="12" cy="13" rx="9.5" ry="3.4"/>
        <ellipse cx="12" cy="13" rx="6.4" ry="2.3"/>
        <ellipse cx="12" cy="13" rx="3.6" ry="1.3"/>
        <circle cx="12" cy="13" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="19.9" cy="14.7" r="0.85" fill="currentColor" stroke="none"/>
        <circle cx="6.1" cy="11.9" r="0.65" fill="currentColor" stroke="none"/>
        <circle cx="14.9" cy="11.1" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <!-- Library: a 4x2 cube-shelf grid, spines as short verticals.
         Re-enabled 2026-07-23 -- see main.js's own comment at the import
         for why (a close-read of the catalog turned up real cross-title
         resonances, now wired in as clickable links, worth being able to
         click through). -->
    <button type="button" class="nav-icon" data-scene="library" aria-label="Library" title="The Library — once removed" onmouseover="pmGlimpse('library')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2.5" y="3" width="19" height="18" rx="0.6"/>
        <line x1="12" y1="3" x2="12" y2="21"/>
        <line x1="2.5" y1="12" x2="21.5" y2="12"/>
        <line x1="5" y1="6.5" x2="5" y2="9.5"/>
        <line x1="7" y1="5.8" x2="7" y2="9.5"/>
        <line x1="9" y1="6.2" x2="9" y2="9.5"/>
        <line x1="15" y1="6.4" x2="15" y2="9.5"/>
        <line x1="17.3" y1="6" x2="17.3" y2="9.5"/>
        <line x1="5" y1="15.5" x2="5" y2="18.5"/>
        <line x1="7.3" y1="15" x2="7.3" y2="18.5"/>
        <line x1="16" y1="15.6" x2="16" y2="18.5"/>
        <line x1="18.2" y1="15.2" x2="18.2" y2="18.5"/>
      </svg>
    </button>
  </nav>

  <!-- Site title — bottom center, links back to gallery. Semantic pass,
       2026-07-22: was <a href="#" role="button"> — it never actually
       navigated anywhere (main.js's click handler always preventDefault()s
       and calls returnToGallery() itself), so a real <button> is what
       this always semantically was. -->
  <button type="button" id="site-title" aria-label="Return to gallery" onmouseover="pmGlimpse('title')">perceptual mechanics</button>

  <!-- Landing -->
  <main id="landing">
    <!-- a11y audit, 2026-07-22: the page had zero headings anywhere —
         screen-reader users navigating by heading had nothing to land on.
         Visually hidden (.sr-only, styles/main.css) rather than a visible
         h1, since a second on-screen title would duplicate #site-title
         and clash with the deliberately minimal landing design. -->
    <h1 class="sr-only">Perceptual Mechanics — an interactive art gallery by Scott Jason Cohen</h1>
    <!-- Semantic pass, 2026-07-22: was <div role="list">/<div role="listitem">
         /<div role="button" tabindex="0"> with a manual keydown handler for
         Enter/Space in main.js. Real <ul>/<li>/<button> need none of that
         ARIA stand-in machinery — a <button> gets Enter/Space activation
         built in, so main.js's keydown listener was removed along with it
         (see main.js's own comment at the click handler). "Press Enter to
         expand" stays in each aria-label; still accurate, keyboard users
         still need to know it's actionable, just via native semantics now
         instead of an ARIA role announcing it. -->
    <ul id="scene-previews" aria-label="Interactive art pieces">

      <!-- Design pass, 2026-07-17: added a `title` to every tile, matching
           its nav-icon counterpart's own title text — the icons already had
           a native hover tooltip, the preview circles never did, so mousing
           over a silent WebGL loop gave a sighted visitor no idea what it
           was before clicking. Doesn't touch layout or visuals, screen
           readers already had the fuller aria-label. -->
      <li class="preview-wrapper" data-scene="sphere">
        <button type="button" class="preview-container" id="preview-sphere"
             title="The Sphere — Interconnected Text Fragments"
             aria-label="The Sphere — an interactive geodesic sphere with text fragments. Press Enter to expand."
             onmouseover="pmGlimpse('sphere')">
        </button>
      </li>

      <li class="preview-wrapper" data-scene="butterfly">
        <button type="button" class="preview-container" id="preview-butterfly"
             title="Chaos Butterfly in Phase Space, 2026"
             aria-label="Chaos Butterfly in Phase Space, 2026 — a Lorenz attractor visualization. Press Enter to expand."
             onmouseover="pmGlimpse('butterfly')">
        </button>
      </li>

      <li class="preview-wrapper" data-scene="manuscript">
        <button type="button" class="preview-container" id="preview-manuscript"
             title="Selected Works — An Illuminated Manuscript"
             aria-label="A scroll of found writing — carved fragments, 2000 to 2012. Press Enter to expand."
             onmouseover="pmGlimpse('scroll')">
        </button>
      </li>

      <li class="preview-wrapper" data-scene="theater">
        <button type="button" class="preview-container" id="preview-theater"
             title="The Theater — Now Playing"
             aria-label="The Theater — scenes from Truth and Beauty, Paul Revere, and You've Got a Friend in Satan, performed by ASCII actors. Press Enter to expand."
             onmouseover="pmGlimpse('theater')">
        </button>
      </li>

      <li class="preview-wrapper" data-scene="egg">
        <button type="button" class="preview-container" id="preview-egg"
             title="The Egg — Aurorae, Magnetic Field, Satellites"
             aria-label="The Egg — Earth's magnetic field, the aurorae it produces, and satellites in orbit. Press Enter to expand."
             onmouseover="pmGlimpse('egg')">
        </button>
      </li>

      <li class="preview-wrapper" data-scene="leaf">
        <button type="button" class="preview-container" id="preview-leaf"
             title="Leaf — In The End It Falls Slowly Through The Aether"
             aria-label="Leaf — a raindrop's fall from a leaf, told through physics, found text arriving in phase with the fall. Press Enter to expand."
             onmouseover="pmGlimpse('leaf')">
        </button>
      </li>

      <li class="preview-wrapper" data-scene="orrery">
        <button type="button" class="preview-container" id="preview-orrery"
             title="The Orrery of Los Feliz"
             aria-label="The Orrery of Los Feliz — a found story, told through a 30-foot orrery. Press Enter to expand."
             onmouseover="pmGlimpse('orrery')">
        </button>
      </li>

      <li class="preview-wrapper" data-scene="library">
        <button type="button" class="preview-container" id="preview-library"
             title="The Library — once removed"
             aria-label="The Library — a real bookshelf, 107 books, films, and divination decks, rebuilt as a shelf you can turn in space. Press Enter to expand."
             onmouseover="pmGlimpse('library')">
        </button>
      </li>
    </ul>
  </main>

  <!-- Full screen experience overlay — no close button; nav is the navigation -->
  <div id="experience-overlay"
       role="dialog"
       aria-modal="true"
       aria-label="Full screen art experience"
       aria-hidden="true">
    <div id="experience-container"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
