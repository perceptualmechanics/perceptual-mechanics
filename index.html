<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="author" content="Scott Jason Cohen"/>
  <meta name="description" content="Perceptual Mechanics — a digital art project by Scott Jason Cohen. Interactive visualizations of chaos, language, and phase space."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&family=Patrick+Hand&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Ogham&display=swap" rel="stylesheet">
  <title>perceptual mechanics</title>
  <meta name="theme-color" content="#000000"/>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

  <a href="#landing" class="skip-link">Skip to main content</a>

  <!-- Persistent nav bar — all four scenes -->
  <nav id="pm-nav" aria-label="Perceptual Mechanics navigation">

    <!-- Sphere: geodesic / icosahedron outline -->
    <button class="nav-icon" data-scene="sphere" aria-label="Sphere" title="The Sphere — Interconnected Text Fragments" onmouseover="window.status='zen archery'; pmGlimpse('zen archery'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <ellipse cx="12" cy="12" rx="9" ry="4"/>
        <line x1="12" y1="3" x2="12" y2="21"/>
        <path d="M3 9h18M3 15h18"/>
      </svg>
    </button>

    <!-- Butterfly: Lorenz / figure-8 attractor shape -->
    <button class="nav-icon" data-scene="butterfly" aria-label="Butterfly" title="Chaos Butterfly in Phase Space, 2026" onmouseover="window.status='complexity'; pmGlimpse('complexity'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 12 C8 6, 2 6, 3 12 C4 18, 10 17, 12 12"/>
        <path d="M12 12 C16 6, 22 6, 21 12 C20 18, 14 17, 12 12"/>
        <circle cx="12" cy="12" r="0.8" fill="currentColor"/>
      </svg>
    </button>

    <!-- Manuscript: Ogham letter Sail, four strokes off a stemline -->
    <button class="nav-icon" data-scene="manuscript" aria-label="Manuscript" title="Selected Works — An Illuminated Manuscript" onmouseover="window.status='savagery'; pmGlimpse('savagery'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="6" y1="2.5" x2="6" y2="21.5"/>
        <line x1="6" y1="5.5" x2="19" y2="5.5"/>
        <line x1="6" y1="9.8" x2="19" y2="9.8"/>
        <line x1="6" y1="14.1" x2="19" y2="14.1"/>
        <line x1="6" y1="18.4" x2="19" y2="18.4"/>
      </svg>
    </button>

    <!-- Theater: film camera -->
    <button class="nav-icon" data-scene="theater" aria-label="The Theater" title="The Theater — Now Playing" onmouseover="window.status='light entertainment'; pmGlimpse('light entertainment'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="7" width="12" height="10" rx="1"/>
        <path d="M15 10.2 L21 7.5 V16.5 L15 13.8"/>
        <circle cx="7.2" cy="5.6" r="1.5"/>
        <circle cx="12" cy="4.6" r="1.1"/>
      </svg>
    </button>

    <!-- Egg, Leaf -->
    <button class="nav-icon" data-scene="egg" aria-label="The Egg" title="The Egg — Aurorae, Magnetic Field, Satellites" onmouseover="window.status='lantern'; pmGlimpse('lantern'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="6"/>
        <path d="M12 3 C18 6 18 18 12 21"/>
        <path d="M12 3 C6 6 6 18 12 21"/>
        <circle cx="20" cy="9" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <button class="nav-icon" data-scene="leaf" aria-label="Leaf" title="Leaf — In The End It Falls Slowly Through The Aether" onmouseover="window.status='stillness'; pmGlimpse('stillness'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3c5 2 7 6 5 11-1.5 3.7-4 5.5-5 7-1-1.5-3.5-3.3-5-7-2-5 0-9 5-11z"/>
        <path d="M12 4v15"/>
      </svg>
    </button>

    <!-- Orrery: sun and concentric orbit rings, hung from a mast — was
         three shells rotated around a shared center, which reads as an
         atom (electron orbits), not an orrery (planets in one plane).
         Scott, 2026-07-17: "it's an atom now, not a solar system." -->
    <button class="nav-icon" data-scene="orrery" aria-label="Orrery" title="The Orrery of Los Feliz" onmouseover="window.status='will'; pmGlimpse('will'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="12" x2="12" y2="2.5"/>
        <ellipse cx="12" cy="13" rx="9.5" ry="3.4"/>
        <ellipse cx="12" cy="13" rx="6.4" ry="2.3"/>
        <ellipse cx="12" cy="13" rx="3.6" ry="1.3"/>
        <circle cx="12" cy="13" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="19.9" cy="14.7" r="0.85" fill="currentColor" stroke="none"/>
        <circle cx="6.1" cy="11.9" r="0.65" fill="currentColor" stroke="none"/>
        <circle cx="14.9" cy="11.1" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <!-- Lens (renamed from Cycle, 2026-07-17; redone the same day as a
         single translucent gem lit by an external spotlight): a kite/
         diamond outline quartered by a cross through the middle, with a
         filled dot at the center for the light — Scott, un-shelving it:
         "well now you have to uncomment it so I can see it :D" -->
    <button class="nav-icon" data-scene="lens" aria-label="The Lens" title="The Lens — Four facets, one light." onmouseover="window.status='refraction'; pmGlimpse('refraction'); return true;" onmouseout="window.status=''; return true;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 L20 12 L12 22 L4 12 Z"/>
        <line x1="12" y1="2" x2="12" y2="22"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>
      </svg>
    </button>

  </nav>

  <!-- Site title — bottom center, links back to gallery -->
  <a href="#" id="site-title" role="button" aria-label="Return to gallery" onmouseover="window.status='secrets'; pmGlimpse('secrets'); return true;" onmouseout="window.status=''; return true;">perceptual mechanics</a>

  <!-- Landing -->
  <main id="landing">
    <div id="scene-previews" role="list" aria-label="Interactive art pieces">

      <!-- Design pass, 2026-07-17: added a `title` to every tile, matching
           its nav-icon counterpart's own title text — the icons already had
           a native hover tooltip, the preview circles never did, so mousing
           over a silent WebGL loop gave a sighted visitor no idea what it
           was before clicking. Doesn't touch layout or visuals, screen
           readers already had the fuller aria-label. -->
      <div class="preview-wrapper" data-scene="sphere" role="listitem">
        <div class="preview-container" id="preview-sphere"
             role="button" tabindex="0" title="The Sphere — Interconnected Text Fragments"
             aria-label="The Sphere — an interactive geodesic sphere with text fragments. Press Enter to expand."
             onmouseover="window.status='zen archery'; pmGlimpse('zen archery'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

      <div class="preview-wrapper" data-scene="butterfly" role="listitem">
        <div class="preview-container" id="preview-butterfly"
             role="button" tabindex="0" title="Chaos Butterfly in Phase Space, 2026"
             aria-label="Chaos Butterfly in Phase Space, 2026 — a Lorenz attractor visualization. Press Enter to expand."
             onmouseover="window.status='complexity'; pmGlimpse('complexity'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

      <div class="preview-wrapper" data-scene="manuscript" role="listitem">
        <div class="preview-container" id="preview-manuscript"
             role="button" tabindex="0" title="Selected Works — An Illuminated Manuscript"
             aria-label="A scroll of found writing — carved fragments, 2000 to 2012. Press Enter to expand."
             onmouseover="window.status='savagery'; pmGlimpse('savagery'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

      <div class="preview-wrapper" data-scene="theater" role="listitem">
        <div class="preview-container" id="preview-theater"
             role="button" tabindex="0" title="The Theater — Now Playing"
             aria-label="The Theater — scenes from Truth and Beauty and Paul Revere, performed by ASCII actors. Press Enter to expand."
             onmouseover="window.status='light entertainment'; pmGlimpse('light entertainment'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

      <div class="preview-wrapper" data-scene="egg" role="listitem">
        <div class="preview-container" id="preview-egg"
             role="button" tabindex="0" title="The Egg — Aurorae, Magnetic Field, Satellites"
             aria-label="The Egg — Earth's magnetic field, the aurorae it produces, and satellites in orbit. Press Enter to expand."
             onmouseover="window.status='lantern'; pmGlimpse('lantern'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

      <div class="preview-wrapper" data-scene="leaf" role="listitem">
        <div class="preview-container" id="preview-leaf"
             role="button" tabindex="0" title="Leaf — In The End It Falls Slowly Through The Aether"
             aria-label="Leaf — a raindrop's fall from a leaf, told through physics, found text arriving in phase with the fall. Press Enter to expand."
             onmouseover="window.status='stillness'; pmGlimpse('stillness'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

      <div class="preview-wrapper" data-scene="orrery" role="listitem">
        <div class="preview-container" id="preview-orrery"
             role="button" tabindex="0" title="The Orrery of Los Feliz"
             aria-label="The Orrery of Los Feliz — a found story, told through a 30-foot orrery. Press Enter to expand."
             onmouseover="window.status='will'; pmGlimpse('will'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

      <div class="preview-wrapper" data-scene="lens" role="listitem">
        <div class="preview-container" id="preview-lens"
             role="button" tabindex="0" title="The Lens — Four facets, one light."
             aria-label="The Lens — a single translucent cut gem with four colored sides, floating free, lit from directly above by a vertical spotlight named Prologue. Press Enter to expand."
             onmouseover="window.status='refraction'; pmGlimpse('refraction'); return true;" onmouseout="window.status=''; return true;">
        </div>
      </div>

    </div>
  </main>

  <!-- Full screen experience overlay — no close button; nav is the navigation -->
  <div id="experience-overlay"
       role="dialog"
       aria-modal="true"
       aria-label="Full screen art experience"
       aria-hidden="true">
    <div id="experience-container"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
