name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # ssh-keyscan can fail on a transient DNS/connectivity blip, and
          # this step runs under `bash -e`, so that alone was enough to
          # kill the whole deploy before rsync ever ran (2026-07-23 --
          # traced from a live site that kept serving stale content after
          # a push). Every downstream step already sets
          # StrictHostKeyChecking=no, so known_hosts here was never
          # load-bearing -- safe to make this non-fatal, same as the SSH
          # connection test below already is.
          ssh-keyscan -H pdx1-shared-a1-46.dreamhost.com >> ~/.ssh/known_hosts || true

      - name: Test SSH connection
        run: |
          ssh -vvv -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            copper_prism@pdx1-shared-a1-46.dreamhost.com "echo connected" || true

      - name: Deploy via rsync
        run: |
          rsync -rlgoDzvc --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o IdentityAgent=none -o StrictHostKeyChecking=no" \
            dist/ \
            copper_prism@pdx1-shared-a1-46.dreamhost.com:/home/copper_prism/perceptualmechanics.com